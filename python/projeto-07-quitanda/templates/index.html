<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Quitanda do Tomate Cru</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>

<body>

    <div class="page-container">

        <div class="header text-center">
            <h1>Quitanda do Tomate Cru</h1>
            <p>Cadastro e controle de produtos da quitanda</p>
        </div>

        <div class="card form-card">
            <h2>Cadastrar produto</h2>

            <input type="hidden" id="id">

            <div class="row">
                <div class="col-md-6">
                    <label>Nome</label>
                    <input id="nome" class="form-control" placeholder="Ex: Tomate">
                </div>

                <div class="col-md-6">
                    <label>Marca</label>
                    <input id="marca" class="form-control" placeholder="Ex: Natural">
                </div>

                <div class="col-md-6">
                    <label>Preço</label>
                    <input id="preco" class="form-control" placeholder="Ex: 9.90">
                </div>

                <div class="col-md-6">
                    <label>Quantidade</label>
                    <input id="quantidade" class="form-control" placeholder="Ex: 20">
                </div>
            </div>

            <button id="btn-salvar" class="btn-save" onclick="gravar_dados()">
                Salvar produto
            </button>
        </div>

        <div id="mensagem" class="alert mt-3 d-none"></div>

        <div class="card table-card">
            <h2>Produtos cadastrados</h2>

            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Marca</th>
                            <th>Preço</th>
                            <th>Quantidade</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody id="tabela-produtos"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="../static/requests.js"></script>

</body>

</html>
