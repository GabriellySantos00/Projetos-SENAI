<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Papyro - Editar Empréstimo</title>

    <!-- CSS do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
  body {
    background-color: #0f172a;
    color: white;
  }

  .navbar {
    background-color: #020617 !important;
  }

  .nav-link, .navbar-brand {
    color: white !important;
  }

  .nav-link:hover {
    color: #38bdf8 !important;
  }

  .dropdown-menu {
    background-color: #020617;
  }

  .dropdown-item {
    color: white;
  }

  .dropdown-item:hover {
    background-color: #0ea5e9;
    color: white;
  }

  /* FORM */
  form {
    background-color: #020617;
    border-radius: 15px;
    box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
  }

  input {
    background-color: #0f172a !important;
    border: 1px solid #1e293b !important;
    color: white !important;
  }

  input:focus {
    border-color: #38bdf8 !important;
    box-shadow: 0 0 5px #38bdf8 !important;
  }

  label {
    color: #cbd5f5;
  }

  /* campos readonly mais “apagados” */
  input[readonly] {
    background-color: #020617 !important;
    color: #94a3b8 !important;
    cursor: not-allowed;
  }

  .btn-success {
    background-color: #0ea5e9;
    border: none;
  }

  .btn-success:hover {
    background-color: #0284c7;
  }

  h3 {
    margin-bottom: 20px;
  }
</style>
  </head>
  <body>
    
    <!-- Menu de navegação -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand text-uppercase fw-bold" href="/">NexStock</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNavDropdown">
            <ul class="navbar-nav">

              <li class="nav-item">
                <a class="nav-link" href="/">Início</a>
              </li>

              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                    Produtos
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="/cadastrar-livro">Cadastrar</a></li>
                  <li><a class="dropdown-item" href="/listar-livro">Listar</a></li>
                </ul>
              </li>

              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                  Leitor
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="/cadastrar-leitor">Cadastrar</a></li>
                  <li><a class="dropdown-item" href="/listar-leitor">Listar</a></li>
                </ul>
              </li>

              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                  Empréstimo
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="/realizar-emprestimo">Realizar</a></li>
                  <li><a class="dropdown-item" href="/listar-emprestimo">Listar</a></li>
                </ul>
              </li>

            </ul>
          </div>
        </div>
    </nav>

    <!-- Painel principal -->
    <main class="container mt-5">

        <h3 class="text-center">Editar Empréstimo</h3>

        <form class="col-6 border mx-auto p-5 mt-3" action="/editar-emprestimo" method="post">

            <div class="mb-3">
                <label for="id" class="form-label">Código do Empréstimo</label>
                <input type="text" class="form-control" id="id" name="id" value="{{ emprestimo[0] }}" readonly>
            </div>

            <div class="mb-3">
                <label for="cpf" class="form-label">CPF do Leitor</label>
                <input type="text" class="form-control" id="cpf" name="cpf" value="{{ emprestimo[1] }}" readonly>
            </div>

            <div class="mb-3">
                <label for="isbn" class="form-label">ISBN do Livro</label>
                <input type="text" class="form-control" id="isbn" name="isbn" value="{{ emprestimo[2] }}" readonly>
            </div>

            <div class="mb-3">
                <label for="data_emprestimo" class="form-label">Data do Empréstimo</label>
                <input type="date" class="form-control" id="data-emprestimo" name="data-emprestimo" value="{{ emprestimo[3] }}" readonly>
            </div>

            <div class="mb-3">
                <label for="data_devolucao" class="form-label">Data de Devolução</label>
                <input type="date" class="form-control" id="data-devolucao" name="data-devolucao" value="{{ emprestimo[4] }}" required>
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-success">Salvar</button>
            </div>

        </form>

    </main>

    <!-- Java Script do Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
