<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastrar Produtos</title>

    <!-- CSS do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
  body {
    background-color: #0f172a;
    color: white;
  }

  .navbar {
    background-color: #020617 !important;
  }

  .nav-link, .navbar-brand {
    color: white !important;
  }

  .nav-link:hover {
    color: #38bdf8 !important;
  }

  .dropdown-menu {
    background-color: #020617;
  }

  .dropdown-item {
    color: white;
  }

  .dropdown-item:hover {
    background-color: #0ea5e9;
    color: white;
  }

  /* FORM */
  form {
    background-color: #020617;
    border-radius: 15px;
    box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
  }

  input {
    background-color: #0f172a !important;
    border: 1px solid #1e293b !important;
    color: white !important;
  }

  input:focus {
    border-color: #38bdf8 !important;
    box-shadow: 0 0 5px #38bdf8 !important;
  }

  label {
    color: #cbd5f5;
  }

  .btn-success {
    background-color: #0ea5e9;
    border: none;
  }

  .btn-success:hover {
    background-color: #0284c7;
  }

  h3 {
    margin-bottom: 20px;
  }
</style>
  </head>
  <body>
    
    <!-- Menu de navegação -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand text-uppercase fw-bold" href="/">NexStock</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNavDropdown">
            <ul class="navbar-nav">

              <li class="nav-item">
                <a class="nav-link" href="/">Início</a>
              </li>

              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                  Produtos
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="/cadastrar-livro">Cadastrar Produtos</a></li>
                  <li><a class="dropdown-item" href="/listar-livro">Lista de Produtos</a></li>
                </ul>
              </li>

              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                  Fornecedor
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="/cadastrar-leitor">Cadastrar Fornecedor</a></li>
                  <li><a class="dropdown-item" href="/listar-leitor">Lista de Fornecedores</a></li>
                </ul>
              </li>

              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                  Movimentação
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="/realizar-emprestimo">Registrar</a></li>
                  <li><a class="dropdown-item" href="/listar-emprestimo">Lista de Movimentações</a></li>
                </ul>
              </li>

            </ul>
          </div>
        </div>
    </nav>

    <!-- Painel principal -->
    <main class="container mt-5">

        <h3 class="text-center">Cadastrar Produto</h3>

        <form class="col-6 border mx-auto p-5 mt-3" action="/cadastrar-livro" method="post">

            <div class="mb-3">
                <label for="isbn" class="form-label">Nome do Produto</label>
                <input type="text" class="form-control" id="isbn" name="isbn" required>
            </div>

            <div class="mb-3">
                <label for="titulo" class="form-label">SKU</label>
                <input type="text" class="form-control" id="titulo" name="titulo" required>
            </div>

            <div class="mb-3">
                <label for="autor" class="form-label">Categoria</label>
                <input type="text" class="form-control" id="autor" name="autor" required>
            </div>

            <div class="mb-3">
                <label for="editora" class="form-label">Quantidade em Estoque</label>
                <input type="number" class="form-control" id="editora" name="editora" required>
            </div>

            <div class="mb-3">
                <label for="ano" class="form-label">Preço de custo</label>
                <input type="number" step="0.01" min="0" class="form-control" id="ano" name="ano" required>
            </div>

            <div class="mb-3">
                <label for="genero" class="form-label">Preço de Venda</label>
                <input  type="number" step="0.01" min="0" class="form-control" id="genero" name="genero" required>
            </div>

            <div class="mb-3">
                <label for="edicao" class="form-label">Detalhes</label>
                <input type="text" class="form-control" id="edicao" name="edicao" required>
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-success">Cadastrar</button>
            </div>

        </form>

    </main>

    <!-- Java Script do Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
