<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movimentação</title>

  <!-- CSS do Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
   body {
          background: linear-gradient(to right, #1e1e2f, #2b2b45);
          color: #fff;
      }

      /* =========================
         NAVBAR
      ========================= */
      .navbar {
          background: rgba(0, 0, 0, 0.6) !important;
          backdrop-filter: blur(10px);
      }

      .navbar .nav-link,
      .navbar .navbar-brand {
          color: #fff !important;
      }

      /* =========================
         DROPDOWN
      ========================= */
      .dropdown-menu {
          background-color: #2b2b45;
          border: none;
      }

      .dropdown-item {
          color: #fff;
      }

      .dropdown-item:hover {
          background-color: #3d3d60;
          color: #fff;
      }

  h3 {
    font-weight: 600;
    color: #f1f5f9;
  }

  /* Card glass */
  .container-box {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    padding: 30px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(56, 189, 248, 0.1);
    border: 1px solid rgba(255,255,255,0.08);
  }

  /* Inputs */
  .form-control {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
    border-radius: 12px;
  }

  .form-control:focus {
    border-color: #38bdf8;
    box-shadow: 0 0 10px rgba(56,189,248,0.5);
  }

  /* Botão neon */
  .btn-success {
    background: linear-gradient(45deg, #06b6d4, #3b82f6);
    border: none;
    border-radius: 12px;
    font-weight: bold;
    transition: 0.3s;
  }

  .btn-success:hover {
    box-shadow: 0 0 15px #38bdf8;
    transform: translateY(-2px);
  }

  /* Tabela */
  .table {
    color: #e2e8f0;
  }

  .table thead {
    background: rgba(56, 189, 248, 0.2);
  }

  .table tbody tr {
    transition: 0.2s;
  }

  .table tbody tr:hover {
    background: rgba(56, 189, 248, 0.1);
  }

  /* Botões */
  .btn-warning {
    background: #facc15;
    border: none;
    color: black;
  }

  .btn-danger {
    background: #ef4444;
    border: none;
  }

</style>
</head>

<body>

  <!-- Menu de navegação -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand text-uppercase fw-bold" href="/">NexStock</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
        aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNavDropdown">
        <ul class="navbar-nav">

          <li class="nav-item">
            <a class="nav-link" href="/">Início</a>
          </li>

          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Produtos
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="/cadastrar-livro">Cadastrar</a></li>
              <li><a class="dropdown-item" href="/listar-livro">Listar</a></li>
            </ul>
          </li>

          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Fornecedor
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="/cadastrar-leitor">Cadastrar Fornecedores</a></li>
              <li><a class="dropdown-item" href="/listar-leitor">Lista de Fornecedores</a></li>
            </ul>
          </li>

          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Movimentação
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="/realizar-emprestimo">Registrar</a></li>
              <li><a class="dropdown-item" href="/listar-emprestimo">Lista de Movimentações</a></li>
            </ul>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <!-- Painel principal -->
  <main class="container mt-5">

    <h3 class="text-center">Registrar Movimentação</h3>

    <form class="col-6 border mx-auto p-5 mt-3" action="/realizar-emprestimo" method="post">


      <div class="mb-3">
        <label for="isbn" class="form-label">Nome do Produto</label>
        <input type="text" class="form-control" id="isbn" name="isbn" required>
      </div>

      <div class="mb-3">
        <label for="tipo">Tipo de Movimentação</label>
        <select name="tipo" class="form-control" required>
          <option value="">Selecione</option>
          <option value="entrada">Entrada</option>
          <option value="saida">Saída</option>
        </select>
      </div>


      <div class="mb-3">
        <label for="cpf" class="form-label">Quantidade</label>
        <input type="number" min="1" class="form-control" id="cpf" name="cpf" required>
      </div>



      <div class="mb-3">
        <label for="data_emprestimo" class="form-label">Data</label>
        <input type="date" class="form-control" id="data-emprestimo" name="data-emprestimo" required>
      </div>

      <div class="mb-3">
        <label for="fornecedor" class="form-label">Fornecedor</label>
        <input type="text" class="form-control" id="fornecedor" name="fornecedor" required>
      </div>

      <div class="mb-3">
        <button type="submit" class="btn btn-success">Executar</button>
      </div>

    </form>

  </main>

  <!-- Java Script do Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
</body>

</html>
