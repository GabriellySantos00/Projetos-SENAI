<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Filme</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>Cadastrar Filme ou Série</h1>

    <form method="POST">
        <input type="text" name="nome" placeholder="Nome" required>
        <input type="text" name="genero" placeholder="Gênero" required>
        <input type="text" name="plataforma" placeholder="Onde assistiu" required>

        <select name="status">
            <option>Quero assistir</option>
            <option>Assistindo</option>
            <option>Finalizado</option>
        </select>

        <input type="number" name="nota" placeholder="Nota de 0 a 10" min="0" max="10">
        <textarea name="comentario" placeholder="Comentário"></textarea>

        <button type="submit">Salvar</button>
    </form>

    <a href="/">Voltar</a>
</div>

</body>
</html>
