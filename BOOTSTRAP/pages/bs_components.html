<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <title>Componentes Bootstrap</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Meu Menu</a>

            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>

                    <li class="nav-item dropdown">
                        <a href="#" class="nav-link dropdown-toggle" id="navbarDrop" role="button"
                            data-bs-toggle="dropdown">
                            Portfólio
                        </a>
                        <ul class="dropdown-menu">
                            <li>
                                <a href="#" class="dropdown-item">Web Design</a>
                            </li>
                            <li>
                                <a href="#" class="dropdown-item">Desenvolvimento</a>
                            </li>
                        </ul>
                    </li>

                    <li class="nav-item">
                        <a href="#" class="nav-link">Contato</a>
                    </li>
                </ul>
            </div>
        </div>

        <form class="d-flex me-2">
            <input type="text" placeholder="Pesquisar" class="form-control me-2">
            <button type="button" class="btn btn-primary">Pesquisar</button>
        </form>
    </nav>

    <div class="container mt-4">
        <span class="badge rounded-pill bg-primary">Java</span>
        <span class="badge rounded-pill bg-secondary">Python</span>
        <span class="badge rounded-pill bg-success">JavaScript</span>
        <span class="badge rounded-pill bg-danger">React</span>
        <span class="badge rounded-pill bg-warning">MySQL</span>
        <span class="badge rounded-pill bg-info">Flask</span>

        <button type="button" class="btn btn-primary ms-2">
            Mensagens <span class="badge bg-danger">4</span>
        </button>
    </div>

    <div class="container mt-5">
        <div class="accordion" id="ex1">
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button" type="button" data-bs-toggle="collapse"
                        data-bs-target="#collapse1">
                        Exemplo Texto 1
                    </button>
                </h2>

                <div id="collapse1" data-bs-parent="#ex1" class="accordion-collapse collapse show">
                    <div class="accordion-body">
                        Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas voluptate, doloremque,
                        cumque, magnam quisquam corporis dicta deleniti consequatur sed nisi.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-5">
        <form>
            <div class="mb-3">
                <label for="email">E-mail</label>
                <input type="email" id="email" class="form-control">
            </div>

            <div class="mb-3">
                <label for="pwd">Senha</label>
                <input type="password" id="pwd" class="form-control">
            </div>

            <div class="form-check mb-3">
                <label class="form-check-label">
                    <input class="form-check-input" type="checkbox">
                    Manter-me conectado
                </label>
            </div>

            <div class="mb-3">
                <label for="comment">Comentários</label>
                <textarea class="form-control" rows="5" id="comment"></textarea>
            </div>

            <button type="submit" class="btn btn-primary">
                Enviar
            </button>
        </form>
    </div>

    <script src="../assets/js/bootstrap.bundle.js"></script>
</body>

</html>
